<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Drawing Video Generator</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #1a1a2e; color: white; }
        h1 { color: #e94560; }
        .container { max-width: 600px; margin: 0 auto; }
        input { padding: 15px; width: 80%; border-radius: 25px; border: none; margin: 20px 0; }
        button { padding: 15px 30px; background: #e94560; color: white; border: none; border-radius: 25px; cursor: pointer; }
        button:hover { background: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 AI Drawing Video Generator</h1>
        <p>Gere videos de desenho com efeito de duplo sentido visual!</p>
        <input type="text" placeholder="Digite o nome do personagem (ex: Goku, Naruto)">
        <br>
        <button>Gerar Video</button>
        <p style="margin-top: 30px; color: #888;">Em desenvolvimento...</p>
    </div>
</body>
</html>
